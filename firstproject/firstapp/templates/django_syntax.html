<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Syntax</title>
</head>
<body>
    <h1>Template Variables</h1>

    <h2>Welcome! {{ user }}</h2>

    {% with fullname=user %}
    <p>Hello! {{fullname}}, how are you?</p>
    {% endwith %}
    
</body>
</html>
